<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZetaTech HMS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header" id="loginHeader">
                <i class="fas fa-user-circle"></i>
                <h2 id="roleTitle">Login</h2>
                <p>Enter your credentials to access the system</p>
            </div>
            
            <div class="login-form">
                <div id="alertContainer"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Login</span>
                    </button>
                </form>
                
                <div class="demo-credentials" id="demoCredentials" style="margin-top: 25px; padding: 15px; background: #f8fafc; border-radius: 8px;">
                    <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 10px;"><i class="fas fa-info-circle"></i> Demo Credentials:</p>
                    <code id="demoText" style="font-size: 0.8rem; color: #1e293b;"></code>
                </div>
                
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Role Selection
                </a>
            </div>
        </div>
    </div>

    <script>
        // API Base URL - Change this to your backend URL
        const API_BASE_URL = 'http://localhost:8000';
        
        // Get role from URL
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'patient';
        
        // Role configuration
        const roleConfig = {
            admin: {
                title: 'Administrator Login',
                icon: 'fa-user-shield',
                class: 'admin',
                demoEmail: 'admin@zetatech.com',
                demoPassword: 'admin123'
            },
            doctor: {
                title: 'Doctor Login',
                icon: 'fa-user-md',
                class: 'doctor',
                demoEmail: 'doctor@zetatech.com',
                demoPassword: 'doctor123'
            },
            nurse: {
                title: 'Nurse Login',
                icon: 'fa-user-nurse',
                class: 'nurse',
                demoEmail: 'nurse@zetatech.com',
                demoPassword: 'nurse123'
            },
            patient: {
                title: 'Patient Login',
                icon: 'fa-user-injured',
                class: 'patient',
                demoEmail: 'patient@example.com',
                demoPassword: 'patient123'
            }
        };
        
        // Apply role styling
        const config = roleConfig[role];
        document.getElementById('roleTitle').textContent = config.title;
        document.getElementById('loginHeader').classList.add(config.class);
        document.getElementById('loginBtn').classList.add(config.class);
        document.getElementById('demoText').textContent = `Email: ${config.demoEmail} / Password: ${config.demoPassword}`;
        
        // Pre-fill demo credentials
        document.getElementById('email').value = config.demoEmail;
        document.getElementById('password').value = config.demoPassword;
        
        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token and user info
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        const userRole = data.user.role;
                        if (userRole === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else if (userRole === 'doctor') {
                            window.location.href = 'doctor-dashboard.html';
                        } else if (userRole === 'nurse') {
                            window.location.href = 'nurse-dashboard.html';
                        } else {
                            window.location.href = 'patient-dashboard.html';
                        }
                    }, 1000);
                } else {
                    showAlert(data.detail || 'Login failed. Please check your credentials.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (error) {
                showAlert('Network error. Please make sure the backend server is running.', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
        
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type}">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
